<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 CAM - S.H.O.S</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 50%, #0a0e27 100%);
            color: #00ff88;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #00ff88;
            padding-bottom: 20px;
        }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #00ff88, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .back-link {
            color: #00b4ff;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }
        .config-section {
            background: rgba(20, 50, 80, 0.5);
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 40px;
        }
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        .form-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #00ff88;
            background: rgba(0, 50, 80, 0.5);
            color: #00ff88;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
        }
        .btn {
            background: linear-gradient(135deg, #00ff88, #00b4ff);
            color: #0a0e27;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .stream-container {
            background: rgba(20, 50, 80, 0.5);
            border: 2px solid #00ff88;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 40px;
        }
        .stream-video {
            max-width: 100%;
            width: 100%;
            height: auto;
            border: 1px solid #00ff88;
            border-radius: 10px;
            background: #000;
        }
        .face-info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 50, 80, 0.3);
            border-radius: 8px;
            border-left: 3px solid #00ff88;
        }
        .face-counter {
            font-size: 2rem;
            color: #00ff88;
            font-weight: bold;
            margin: 10px 0;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .info-card {
            background: rgba(20, 50, 80, 0.5);
            border: 1px solid #00ff88;
            border-radius: 10px;
            padding: 20px;
        }
        .info-title {
            color: #00ff88;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .info-value {
            color: #00b4ff;
            font-size: 1.5rem;
            font-family: 'Space Mono', monospace;
        }
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            background: #ff5555;
        }
        .status-dot.active {
            background: #00ff88;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Retour à l'accueil</a>
        <div class="header">
            <h1>🎥 ESP32-CAM Streaming</h1>
        </div>

        <div class="config-section">
            <h2 style="color: #00ff88; margin-bottom: 15px;">Configuration IP</h2>
            <div class="form-group">
                <input type="text" class="form-input" id="esp32-ip" placeholder="192.168.1.X" value="192.168.1.100">
                <button class="btn" onclick="connectESP32()">🔌 Connecter</button>
            </div>
        </div>

        <div class="stream-container">
            <h2 style="color: #00ff88; margin-bottom: 15px;">📹 Flux Vidéo</h2>
            <img class="stream-video" id="stream-video" src="" alt="Streaming ESP32">
            <div class="face-info">
                <div style="color: #00b4ff;">👤 Visages Détectés</div>
                <div class="face-counter" id="face-count">0</div>
            </div>
        </div>

        <h2 style="color: #00ff88; margin-bottom: 20px;">📊 Télémétrie</h2>
        <div class="info-grid">
            <div class="info-card">
                <div class="info-title">Status</div>
                <div class="info-value"><span class="status-dot" id="status-dot"></span><span id="status-text">--</span></div>
            </div>
            <div class="info-card">
                <div class="info-title">FPS</div>
                <div class="info-value" id="fps-value">15</div>
            </div>
            <div class="info-card">
                <div class="info-title">Température</div>
                <div class="info-value" id="temp-value">--°C</div>
            </div>
            <div class="info-card">
                <div class="info-title">WiFi Signal</div>
                <div class="info-value" id="wifi-value">-- dBm</div>
            </div>
            <div class="info-card">
                <div class="info-title">Mémoire Libre</div>
                <div class="info-value" id="memory-value">-- MB</div>
            </div>
            <div class="info-card">
                <div class="info-title">Uptime</div>
                <div class="info-value" id="uptime-value">-- s</div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        socket.on('esp32_update', (data) => {
            document.getElementById('status-dot').classList.add('active');
            document.getElementById('status-text').textContent = 'CONNECTÉ';
            if (data.fps) document.getElementById('fps-value').textContent = data.fps;
            if (data.temperature) document.getElementById('temp-value').textContent = data.temperature.toFixed(1) + '°C';
            if (data.wifi_rssi) document.getElementById('wifi-value').textContent = data.wifi_rssi + ' dBm';
            if (data.memory) document.getElementById('memory-value').textContent = data.memory.toFixed(1) + ' MB';
            if (data.uptime) document.getElementById('uptime-value').textContent = Math.floor(data.uptime) + ' s';
        });

        function connectESP32() {
            const ip = document.getElementById('esp32-ip').value;
            const streamUrl = `http://${ip}:81/stream`;
            document.getElementById('stream-video').src = streamUrl;
            socket.emit('request_esp32_data', { ip: ip });
        }

        // Charger l'IP depuis localStorage
        const savedIp = localStorage.getItem('esp32-ip');
        if (savedIp) {
            document.getElementById('esp32-ip').value = savedIp;
            connectESP32();
        }

        // Sauvegarder l'IP
        document.getElementById('esp32-ip').addEventListener('change', (e) => {
            localStorage.setItem('esp32-ip', e.target.value);
        });
    </script>
</body>
</html>
