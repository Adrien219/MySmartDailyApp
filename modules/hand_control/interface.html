<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOS - {{ config.name }}</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root { --neon-green: #00ff88; --neon-blue: #00b4ff; --bg-dark: #0a0e14; }
        
        body { 
            background: var(--bg-dark); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            overflow: hidden;
            border: 2px solid var(--neon-green);
            height: 98vh;
        }

        .hud-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            padding: 20px;
            height: 90%;
        }

        .video-section {
            position: relative;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 180, 255, 0.2);
            border-radius: 10px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-feed { width: 100%; height: auto; border-radius: 5px; }

        .gesture-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid var(--neon-green);
            padding: 10px 20px;
            font-weight: bold;
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--neon-blue);
            padding: 15px;
            border-radius: 0 10px 10px 0;
        }

        .command-list {
            list-style: none;
            padding: 0;
        }

        .command-item {
            padding: 10px;
            margin-bottom: 5px;
            border: 1px solid rgba(0, 255, 136, 0.1);
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .command-item.active {
            background: var(--neon-green);
            color: black;
            font-weight: bold;
            box-shadow: 0 0 15px var(--neon-green);
        }

        .back-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 25px;
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div style="padding: 10px 20px; background: rgba(0, 255, 136, 0.1); border-bottom: 1px solid var(--neon-green);">
        <span style="color: var(--neon-green);">SYSTEM:</span> {{ config.name }} | <span style="color: var(--neon-blue);">USER:</span> {{ profile.name }}
    </div>

    <div class="hud-container">
        <div class="video-section">
            <div class="gesture-badge" id="current-gesture">SCANNING...</div>
                        
            <div class="video-container" style="position: relative; border: 2px solid #00f2ff; background: #000;">
                <img id="main-video" src="{{ url_for('video_feed_pi') }}" 
                 style="width: 100%; height: auto; display: block;" 
                 onerror="this.src='{{ url_for('static', filename='img/camera_error.png') }}';">
            
                <div id="video-loader" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00f2ff;">
                CHARGEMENT DU FLUX...
                </div>
            </div>

        <script>
            // Petit script pour cacher le message "Chargement" une fois que l'image arrive
            const vimg = document.getElementById('main-video');
            vimg.onload = function() {
                document.getElementById('video-loader').style.display = 'none';
            };
        </script>
                        
        </div>

        <div class="sidebar">
            <div class="info-card">
                <h3 style="margin:0; color: var(--neon-blue);">STATUT IA</h3>
                <p id="ai-status" style="font-size: 0.8rem; opacity: 0.8;">Médiapipe opérationnel</p>
            </div>

            <div class="info-card">
                <h4 style="margin:0 0 10px 0;">BIBLIOTHÈQUE</h4>
                <div class="command-list">
                    <div id="PALM" class="command-item">🖐️ PLEINE MAIN : START</div>
                    <div id="FIST" class="command-item">✊ POING : STOP</div>
                    <div id="POINT" class="command-item">☝️ INDEX : ANALYSE</div>
                    <div id="THUMBS_UP" class="command-item">👍 POUCE : VALIDATION</div>
                </div>
            </div>
        </div>
    </div>

    <a href="/" class="back-btn">RETOUR MENU</a>

    <script>
        const socket = io();
        
        // On écoute les données de la caméra que le serveur envoie déjà
        socket.on('camera_status', function(data) {
            const gesture = data.gesture;
            const badge = document.getElementById('current-gesture');
            
            if (gesture !== "NONE") {
                badge.textContent = "DETECTÉ: " + gesture;
                badge.style.background = "rgba(0, 180, 255, 0.4)";
            } else {
                badge.textContent = "SCANNING...";
                badge.style.background = "rgba(0, 255, 136, 0.2)";
            }

            // Allumage visuel de la commande dans la liste
            document.querySelectorAll('.command-item').forEach(el => el.classList.remove('active'));
            const activeItem = document.getElementById(gesture);
            if (activeItem) activeItem.classList.add('active');
        });

        // Demander des mises à jour toutes les 100ms
        setInterval(() => {
            socket.emit('request_camera_status');
        }, 100);
    </script>
</body>
</html>
